[general]
current_preset = 0
path = "C:/Users/Administrator/Desktop"
# 方案1：从浏览器自动读取Cookie（无需手动导出，推荐）
# 支持 chrome/edge/firefox/safari 等，根据你的浏览器选择
global_args = "--cookies-from-browser firefox"
# 方案2：使用手动导出的Cookie文件（需先导出youtube_cookies.txt，替换为实际路径）
# lobal_args = "--cookies D:/monorepo/yt-dlp-gui/app/youtube_cookies.txt"  # Windows示例
# global_args = "--cookies /Users/xxx/yt-dlp-gui/youtube_cookies.txt"  # macOS示例
# global_args = "--cookies /home/xxx/yt-dlp-gui/youtube_cookies.txt"  # Linux示例
update_ytdlp = true

# create your own presets or modify existing ones
cookie_path = "D:/work/yt-dlp-gui/www.youtube.com_cookies.txt"
[presets]
best = "-f bv*[ext=mp4]+ba[ext=m4a]/b[ext=mp4]/bv*+ba/b"
mp4 = "-f bv*[vcodec^=avc]+ba[ext=m4a]/b"
mp3 = "--extract-audio --audio-format mp3 --audio-quality 0"
# uncomment below to add wav preset.
# wav = "--extract-audio --audio-format wav --audio-quality 0"
